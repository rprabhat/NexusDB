<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Logo mark: interconnected nodes -->
  <g transform="translate(10, 10)">
    <!-- Outer nodes -->
    <circle cx="10" cy="10" r="4" fill="#6366f1"/>
    <circle cx="30" cy="10" r="4" fill="#6366f1"/>
    <circle cx="10" cy="30" r="4" fill="#6366f1"/>
    <circle cx="30" cy="30" r="4" fill="#6366f1"/>
    <!-- Inner nodes -->
    <circle cx="20" cy="5" r="3" fill="#8b5cf6"/>
    <circle cx="20" cy="35" r="3" fill="#8b5cf6"/>
    <circle cx="5" cy="20" r="3" fill="#8b5cf6"/>
    <circle cx="35" cy="20" r="3" fill="#8b5cf6"/>
    <!-- Center hub -->
    <circle cx="20" cy="20" r="5" fill="#06b6d4"/>
    <!-- Connections -->
    <line x1="10" y1="10" x2="20" y2="20" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <line x1="30" y1="10" x2="20" y2="20" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="30" x2="20" y2="20" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <line x1="30" y1="30" x2="20" y2="20" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="10" x2="30" y2="10" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="10" y1="30" x2="30" y2="30" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="10" y1="10" x2="10" y2="30" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="30" y1="10" x2="30" y2="30" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Wordmark -->
  <text x="60" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#f1f5f9">
    Sensible<tspan fill="#6366f1">DB</tspan>
  </text>
  <text x="60" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" letter-spacing="1">
    EXPLORE YOUR DATA'S CONNECTIONS
  </text>
</svg>
